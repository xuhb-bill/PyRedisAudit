# PyRedisAudit Default Configuration

# Global settings
global:
  target_redis_version: "6.0" # Default Redis version for compatibility check
  log_level: "INFO"           # INFO, DEBUG, WARNING, ERROR
  log_file: "logs/audit.log"  # Path to log file

# Rule settings
rules:
  # Check if commands are supported in target Redis version
  check_version_compatibility:
    enable: true
    level: "error" # error, warning

  # Forbidden high-risk commands
  check_high_risk_commands:
    enable: true
    level: "error"
    params:
      forbidden: ["FLUSHALL", "FLUSHDB", "KEYS", "SHUTDOWN"]

  # Check Key naming convention
  check_key_naming:
    enable: true
    level: "warning"
    params:
      pattern: "^[a-zA-Z0-9_:-]+$" # Simple alphanumeric with : and -
      max_length: 128

  # Enforce TTL for write commands
  check_ttl_requirement:
    enable: true
    level: "warning"
    params:
      commands: ["SET", "HSET", "LPUSH", "SADD", "ZADD"]
